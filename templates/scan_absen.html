{% extends "base.html" %}

{% block title %}Scan Kehadiran Mandiri - MISDINAR{% endblock %}

{% block content %}
<div class="page-header" style="text-align: center; margin-bottom: 30px;">
    <h2>Scan Kehadiran Otomatis</h2>
    <p>Arahkan kamera ke QR Code milik Anda pada kertas jadwal yang tercetak di Sakristi / Papan Pengumuman.</p>
</div>

<div class="card" style="background: white; padding: 30px; border-radius: 16px; box-shadow: var(--shadow); text-align: center; max-width: 600px; margin: 0 auto;">
    <script src="https://unpkg.com/html5-qrcode" type="text/javascript"></script>
    
    <div id="reader" style="width: 100%; border-radius: 12px; overflow: hidden; border: 4px solid var(--primary-blue); min-height: 300px; background: #000;"></div>
    
    <div id="resultBox" style="margin-top: 24px; padding: 16px; border-radius: 8px; display: none; font-weight: bold; font-size: 15px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); line-height: 1.5;"></div>
</div>

<script>
let isScanning = false;

function onScanSuccess(decodedText, decodedResult) {
    if (isScanning) return; 
    isScanning = true;
    
    let box = document.getElementById('resultBox');
    box.style.display = 'block';
    box.style.backgroundColor = '#fef3c7';
    box.style.color = '#d97706';
    box.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Memvalidasi jadwal & waktu...';
    
    try {
        JSON.parse(decodedText);
        
        fetch("{{ url_for('api_absen') }}", {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: decodedText
        })
        .then(res => res.json())
        .then(data => {
            if (data.success) {
                box.style.backgroundColor = '#dcfce7';
                box.style.color = '#059669';
                box.innerHTML = '<i class="fas fa-check-circle"></i> ' + data.message;
            } else {
                box.style.backgroundColor = '#fee2e2';
                box.style.color = '#dc2626';
                box.innerHTML = '<i class="fas fa-times-circle"></i> ' + data.message;
            }
            
            setTimeout(() => {
                box.style.display = 'none';
                isScanning = false;
            }, 5000); 
        })
        .catch(err => {
            box.style.backgroundColor = '#fee2e2';
            box.style.color = '#dc2626';
            box.innerHTML = '<i class="fas fa-exclamation-triangle"></i> Gagal terhubung ke server.';
            setTimeout(() => { box.style.display = 'none'; isScanning = false; }, 3000);
        });
        
    } catch(e) {
        box.style.backgroundColor = '#fee2e2';
        box.style.color = '#dc2626';
        box.innerHTML = '<i class="fas fa-times-circle"></i> QR Code bukan format absensi.';
        setTimeout(() => { box.style.display = 'none'; isScanning = false; }, 3000);
    }
}

function onScanFailure(error) {}

// OPTIMASI: Menggunakan FPS 10 agar HP low-end tidak lag.
let html5QrcodeScanner = new Html5QrcodeScanner(
  "reader",
  { 
      fps: 10,
      qrbox: {width: 250, height: 250},
      aspectRatio: 1.0,
      videoConstraints: {
          facingMode: "environment"
      }
  },
  false);
  
html5QrcodeScanner.render(onScanSuccess, onScanFailure);
</script>
{% endblock %}
